<!DOCTYPE html>
<html>
<head>
    <title>Faculty Dashboard</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h2>Faculty Dashboard</h2>
<h3>Pending Request</h3>

<div id="requestBox">
    <p id="studentData"></p>
    <button onclick="approve()">Approve</button>
    <button onclick="reject()">Reject</button>
</div>

<script>
document.getElementById("studentData").innerText =
"Name: Demo Student | Reason: Going Home";

function approve() {
    document.getElementById("requestBox").innerHTML = "✅ Approved";
}

function reject() {
    document.getElementById("requestBox").innerHTML = "❌ Rejected";
}
</script>

</body>
</html>
